<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <link rel="stylesheet" href="./src/output.css">
</head>

<body>
   <header
      class="flex max-w-[1300px] m-auto justify-evenly p-[20px] bg-[#438DB8] items-center text-white text-[16px] font-light">
      <div class="lg:flex items-center gap-[10px] hidden sm:flex">
         <p>Follow us: </p>
         <img src="./forimg/facebook.png" alt="">
         <img src="./forimg/instagarm.png" alt="">
         <img src="./forimg/twitter.png" alt="">
      </div>
      <div class="font-bold">Winter is coming! 50% off for new year</div>
      <div class="lg:flex items-center gap-[20px] hidden">
         <div class="flex gap-[5px] items-center">
            <img src="./forimg/badge.png" alt="">
            <p>(+98) 253-1189</p>
         </div>
         <div class="flex items-center gap-[5px]">
            <img src="./forimg/badge (1).png" alt="">
            <p>pigmentagency@gmail.com</p>
         </div>
      </div>
   </header>

   <section
      class="flex flex-col p-[20px] max-w-[1300px] m-auto justify-between h-[150px] sm:flex-row sm:justify-evenly sm:items-center">
      <div class="flex justify-evenly sm:gap-[30px]">
         <div><img class="lg:hidden" src="./forimg/menu.png" alt=""></div>
         <div><img src="./forimg/Mansoury..png" alt=""></div>
      </div>
      <div class="hidden lg:flex gap-[20px] text-[20px] text-[#666666] font-[600]">
         <p>Home</p>
         <p>Products</p>
         <p>Pages</p>
         <p>About us</p>
         <p>Contact us</p>
      </div>
      <div class="flex items-center justify-evenly sm:gap-[20px]">
         <input class="placeholder:text-[#666666] py-[5px] pl-[25px] border-1 border-[gray] rounded-[5px] text-[20px]"
            type="text" placeholder="👤 Register / Login">
         <img class="p-[10px] border-1 border-[gray] rounded-[5px]" src="./forimg/badge (2).png" alt="">
         <img class="p-[10px] border-1 border-[gray] rounded-[5px]" src="./forimg/badge (3).png" alt="">
      </div>
   </section>

   <section
      class="max-w-[1300px] m-auto relative bg-[url(../forimg/bg1.png)] bg-cover bg-center bg-no-repeat min-h-[500px] flex flex-col justify-between py-20 px-6 font-sans">

      <div class="absolute inset-0 bg-black/20"></div>

      <div class="relative z-10 max-w-6xl mx-auto w-full">
         <h1 class="text-white text-3xl md:text-5xl font-medium leading-tight max-w-2xl text-center md:text-left">
            Enhance Your Home with convenience and Style
         </h1>
      </div>

      <div class="relative z-10 max-w-6xl mx-auto w-full flex justify-center">
         <div class="flex gap-2">
            <div class="w-12 h-1.5 bg-[#5D9CCF] rounded-sm cursor-pointer"></div>
            <div class="w-12 h-1.5 bg-[#5D9CCF] rounded-sm cursor-pointer"></div>
            <div class="w-12 h-1.5 bg-white rounded-sm cursor-pointer"></div>
         </div>
      </div>

   </section>
</body>

</html>
